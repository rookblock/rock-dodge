<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ROCK DODGE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen" style="display: flex;">
        <div class="login-box">
            <h1>ROCK DODGE</h1>
            <input type="text" id="username" placeholder="プレイヤー名" autocomplete="off">
            <input type="password" id="password" placeholder="パスワード">
            <button type="button" id="loginBtn" onclick="login()">ログイン / 新規登録</button>
        </div>
    </div>

    <div id="game-container" style="display: none;">
        <canvas id="gameCanvas"></canvas>
        <button id="menu-btn" onclick="toggleMenu()">≡</button>
        <div id="menu-overlay">
            <div class="menu-content">
                <h2>MENU</h2>
                <button onclick="toggleMenu()">再開</button>
                <button onclick="logout()">ログアウト</button>
                <button id="secret-btn" onclick="openSecretPad()" style="margin-top:20px; background:#444; font-size:12px; color:#888; border:none;">?</button>
            </div>
        </div>
    </div>

    <div id="secret-pad" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; flex-direction:column; align-items:center; justify-content:center; color:white; font-family:sans-serif;">
        <h3>ENTER ADMIN CODE</h3>
        <div id="code-display" style="color:#0f0; font-size:40px; margin-bottom:20px; letter-spacing:10px;">____</div>
        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px;">
            <button class="pad-btn" onclick="inputNum(1)">1</button>
            <button class="pad-btn" onclick="inputNum(2)">2</button>
            <button class="pad-btn" onclick="inputNum(3)">3</button>
            <button class="pad-btn" onclick="inputNum(4)">4</button>
            <button class="pad-btn" onclick="inputNum(5)">5</button>
            <button class="pad-btn" onclick="inputNum(6)">6</button>
            <button class="pad-btn" onclick="inputNum(7)">7</button>
            <button class="pad-btn" onclick="inputNum(8)">8</button>
            <button class="pad-btn" onclick="inputNum(9)">9</button>
            <button class="pad-btn" onclick="closeSecretPad()" style="background:#555;">戻る</button>
            <button class="pad-btn" onclick="inputNum(0)">0</button>
            <button class="pad-btn" onclick="clearCode()" style="background:#555;">C</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
